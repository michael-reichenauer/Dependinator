<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="HandheldFriendly" content="true" />

    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <title>Dependinator</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

            overflow: hidden;
        }
    </style>
</head>

<body oncontextmenu="return false;" style="background-color:#000000;">
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script
        data-clerk-publishable-key="pk_test_cmVuZXdlZC1oZW4tOTguY2xlcmsuYWNjb3VudHMuZGV2JA"
        crossorigin="anonymous"
        src="https://renewed-hen-98.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        async></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        // Startup dispatcher — two page-load modes:
        //
        // Mode 1 — Magic-link redirect (dep-clerk-signin flag in localStorage)
        //   The tab opened by clicking the magic link email for standalone WASM.
        //   Broadcasts sign-in completion to the original tab.
        //
        // Mode 2 — Normal page load → Blazor.start()
        //
        // Note: VS Code extension sign-in is handled entirely by the extension's
        // own local HTTP server (cloudSyncNode.ts) and does not use this page.

        (function () {
            var signinPending = localStorage.getItem("dep-clerk-signin");
            if (signinPending && (Date.now() - parseInt(signinPending, 10)) < 600000) {
                // sessionStorage is per-tab: the tab that called clerkSignIn() set
                // this flag, so a reload of that same tab will still have it.
                // A NEW tab (magic-link redirect) will not.
                var isOriginalTab = sessionStorage.getItem("dep-clerk-signin-initiator");

                if (isOriginalTab) {
                    // ── Original tab reloaded by Clerk after sign-in ──
                    // Clean up and start the app normally (user is now signed in).
                    localStorage.removeItem("dep-clerk-signin");
                    sessionStorage.removeItem("dep-clerk-signin-initiator");
                    Blazor.start();
                    return;
                }

                // ── Magic-link redirect tab ──
                // Show a minimal page instead of loading the full WASM app.
                document.getElementById("app").innerHTML =
                    "<div style='color:#ccc;font-family:sans-serif;text-align:center;margin-top:40vh;'>"
                    + "<p>Completing sign-in...</p></div>";

                var start = Date.now();
                var iv = setInterval(async function () {
                    var c = window.Clerk;
                    if (c && !c.loaded && typeof c.load === "function" && !c._bootCalled) {
                        c._bootCalled = true;
                        try { await c.load(); } catch (_) { }
                    }
                    if (c && c.loaded) {
                        clearInterval(iv);
                        if (c.user || c.session) {
                            localStorage.removeItem("dep-clerk-signin");
                            document.getElementById("app").innerHTML =
                                "<div style='color:#ccc;font-family:sans-serif;text-align:center;margin-top:40vh;'>"
                                + "<p>Sign-in complete! You can close this tab.</p></div>";
                            try {
                                var bc = new BroadcastChannel("dep-clerk-auth");
                                bc.postMessage({ type: "signed-in" });
                                bc.close();
                            } catch (_) { }
                        } else {
                            localStorage.removeItem("dep-clerk-signin");
                            Blazor.start();
                        }
                        return;
                    }
                    if (Date.now() - start > 15000) {
                        clearInterval(iv);
                        localStorage.removeItem("dep-clerk-signin");
                        Blazor.start();
                    }
                }, 200);
                return;
            }

            // ── Normal page load ──
            Blazor.start();
        })();
    </script>
</body>

</html>
