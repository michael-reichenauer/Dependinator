name: Dependinator CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, dev]

jobs:
  # Gate the deploy on the test suites passing (reusable workflows). They run only when a
  # deploy would (not on PR close), so they don't block the close job below.
  unit-tests:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    uses: ./.github/workflows/unit-tests.yml
  e2e:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    uses: ./.github/workflows/e2e.yml
    # Publishing dev/main (a push) runs the full gate: all browsers + cloud-sync tests.
    # PR previews stay light (Chromium, no sync) for fast feedback.
    with:
      browsers: ${{ github.event_name == 'push' && 'all' || 'chromium' }}
      sync: ${{ github.event_name == 'push' }}

  # Dependabot PR runs get no repository secrets (GitHub policy), so the SWA deploy
  # would fail on a missing token. Tests above still run; only deploy/close are skipped.
  build_and_deploy_job:
    needs: [unit-tests, e2e]
    if: github.actor != 'dependabot[bot]' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed'))
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.101"
          global-json-file: global.json
      - name: Install WASM workload
        run: dotnet workload restore Dependinator.sln
      - name: Restore
        run: dotnet restore Dependinator.sln
      # Tests run in the unit-tests / e2e jobs above (this deploy 'needs' them).
      - name: Publish Dependinator WASM
        run: |
          rm -rf src/Dependinator.Wasm/publish
          dotnet publish src/Dependinator.Wasm/Dependinator.Wasm.csproj -c Release --no-restore -o src/Dependinator.Wasm/publish
          cp src/Dependinator.Wasm/staticwebapp.config.json src/Dependinator.Wasm/publish/wwwroot/staticwebapp.config.json
      - name: Publish API
        run: |
          rm -rf src/Api/publish
          dotnet publish src/Api/Api.csproj -c Release -o src/Api/publish
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_ISLAND_0E6A6EB03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "src/Dependinator.Wasm/publish/wwwroot" # Prebuilt app content
          api_location: "src/Api/publish"
          skip_app_build: true
          skip_api_build: true
          ###### End of Repository/Build Configurations ######
          production_branch: "main"

  # After a successful main deploy, build and publish the VS Code extension.
  # The job-level concurrency uses the same group as manual runs of that workflow,
  # so two quick main pushes (or a manual dispatch) can't race on the version-bump push.
  vscode_extension:
    needs: [build_and_deploy_job]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/vscode-extension.yml
    secrets: inherit
    permissions:
      contents: write
    concurrency:
      group: vscode-extension
      cancel-in-progress: false

  close_pull_request_job:
    if: github.actor != 'dependabot[bot]' && github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_ISLAND_0E6A6EB03 }}
          action: "close"
