name: Unit tests

# Runs the non-UI test suites (Api / Core / Roslyn / UI). This builds the whole solution
# (so it also catches build/format breaks in any project) and runs `dotnet test`; the
# Playwright e2e tests skip themselves unless E2E=1, so no app or browsers are needed here.
# Runs on push to feature branches (main/dev are excluded since the CI/CD workflow calls
# this there), and is also called by the CI/CD and extension workflows so deploy/build
# wait for it.
on:
  push:
    branches-ignore: [main, dev]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # The solution includes the Blazor WebAssembly host; restore any workloads it needs
      # (no-op if none) so the solution builds on a clean runner.
      - name: Restore workloads
        run: dotnet workload restore Dependinator.sln

      - name: Test
        run: dotnet test Dependinator.sln
