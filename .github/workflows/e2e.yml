name: E2E (Playwright)

# Runs the Dependinator.E2E.Tests UI suite via ./scripts/e2e. On a plain push (feature branches;
# main/dev are excluded since the CI/CD workflow calls this there) it runs Chromium only,
# no cloud-sync — a quick check. The CI/CD and extension workflows call it before
# publishing and pass browsers=all + sync=true, so the pre-publish gate covers all
# browsers and the cloud-sync ([SyncFact]) tests. Can also be run manually. Playwright
# traces are uploaded as an artifact on failure (open the .zip at trace.playwright.dev).
on:
  push:
    branches-ignore: [main, dev]
  workflow_call:
    inputs:
      browsers:
        description: "chromium | all"
        type: string
        default: chromium
      sync:
        description: Also run the cloud-sync tests (./scripts/e2e -s)
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      browsers:
        description: Browsers to test
        type: choice
        options: [chromium, all]
        default: chromium
      sync:
        description: Also run the cloud-sync tests (./scripts/e2e -s)
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      # Resolve the run config from the inputs (empty on a plain push -> defaults):
      #   install   = browsers to install   e2e_args = ./scripts/e2e flags (-a / -s)   sync = bool
      - name: Determine config
        id: cfg
        run: |
          browsers="${{ inputs.browsers }}"
          sync="${{ inputs.sync }}"
          [ -z "$browsers" ] && browsers=chromium
          [ "$sync" = "true" ] || sync=false
          args=""
          if [ "$browsers" = "all" ]; then
            echo "install=chromium firefox webkit" >> "$GITHUB_OUTPUT"
            args="$args -a"
          else
            echo "install=chromium" >> "$GITHUB_OUTPUT"
          fi
          [ "$sync" = "true" ] && args="$args -s"
          echo "sync=$sync" >> "$GITHUB_OUTPUT"
          echo "e2e_args=$args" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # The cloud-sync API (Api) is a .NET 8 isolated Functions worker, so its runtime is
      # needed (alongside the SDK from global.json) to run the sync tests.
      - name: Setup .NET 8 runtime (sync tests)
        if: steps.cfg.outputs.sync == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Build the test project so playwright.ps1 (used to install browsers) exists.
      - name: Build e2e test project
        run: dotnet build tests/Dependinator.E2E.Tests/Dependinator.E2E.Tests.csproj

      - name: Install Playwright browsers
        run: pwsh tests/Dependinator.E2E.Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps ${{ steps.cfg.outputs.install }}

      # ./scripts/e2e -s starts the cloud-sync stack itself but needs these tools on the runner.
      - name: Install Azure Functions Core Tools + Azurite (sync tests)
        if: steps.cfg.outputs.sync == 'true'
        run: |
          # Azurite is a pure-Node package — reliable via npm.
          npm install -g azurite
          # Azure Functions Core Tools: install from the Microsoft apt feed. (The npm
          # package downloads a binary from a CDN during install, which is flaky on CI.)
          if ! command -v func >/dev/null; then
            sudo apt-get update
            if ! sudo apt-get install -y azure-functions-core-tools-4; then
              # Runner is missing the Microsoft package feed — add it and retry.
              wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb" -O /tmp/pmc.deb
              sudo dpkg -i /tmp/pmc.deb
              sudo apt-get update
              sudo apt-get install -y azure-functions-core-tools-4
            fi
          fi
          func --version

      # ./scripts/e2e starts Dependinator.Web itself (test mode, embedded demo model) and stops it
      # afterwards. E2E_TRACE=1 records a trace per test for the artifact below.
      - name: Run e2e tests
        env:
          E2E_TRACE: "1"
        run: ./scripts/e2e ${{ steps.cfg.outputs.e2e_args }}

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/Dependinator.E2E.Tests/traces/
          if-no-files-found: ignore
          retention-days: 14
