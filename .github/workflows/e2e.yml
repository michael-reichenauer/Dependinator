name: E2E (Playwright)

# Runs the Dependinator.E2E.Tests UI suite via ./e2e (Chromium). Runs on every push (all
# branches), and is also called by the CI/CD and extension workflows so deploy/build wait
# for it (a second run on main/dev — acceptable). Can also be run manually — pick "all" to
# validate Firefox + WebKit too (e.g. before a release). Playwright traces are uploaded as
# an artifact on failure — download the .zip and open it at https://trace.playwright.dev.
on:
  push:
  workflow_call:
  workflow_dispatch:
    inputs:
      browsers:
        description: Browsers to test
        type: choice
        options: [chromium, all]
        default: chromium

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Determine browsers
        id: cfg
        run: |
          if [ "${{ github.event.inputs.browsers }}" = "all" ]; then
            echo "install=chromium firefox webkit" >> "$GITHUB_OUTPUT"
            echo "e2e_args=-a" >> "$GITHUB_OUTPUT"
          else
            echo "install=chromium" >> "$GITHUB_OUTPUT"
            echo "e2e_args=" >> "$GITHUB_OUTPUT"
          fi

      # Build the test project so playwright.ps1 (used to install browsers) exists.
      - name: Build e2e test project
        run: dotnet build Dependinator.E2E.Tests/Dependinator.E2E.Tests.csproj

      - name: Install Playwright browsers
        run: pwsh Dependinator.E2E.Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps ${{ steps.cfg.outputs.install }}

      # ./e2e starts Dependinator.Web itself (test mode, embedded demo model) and stops
      # it afterwards. E2E_TRACE=1 records a trace per test for the artifact below.
      # Sync tests ([SyncFact]) are skipped here — they need func + Azurite (-s).
      - name: Run e2e tests
        env:
          E2E_TRACE: "1"
        run: ./e2e ${{ steps.cfg.outputs.e2e_args }}

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: Dependinator.E2E.Tests/traces/
          if-no-files-found: ignore
          retention-days: 14
