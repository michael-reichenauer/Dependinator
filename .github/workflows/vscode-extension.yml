name: Build VS Code Extension

on:
  # Called by the Dependinator CI/CD workflow at the end of a successful main run.
  workflow_call:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to VS Code Marketplace (requires VSCE_PAT)
        type: boolean
        default: false

permissions:
  contents: write

# Serialize runs so two quick pushes to main can't race on the version-bump push.
# This covers workflow_dispatch runs; the CI/CD caller job uses the same group name,
# so called and manual runs also serialize against each other.
concurrency:
  group: vscode-extension
  cancel-in-progress: false

jobs:
  # Gate the extension pipeline (version bump, build, publish) on the test suites.
  # When called from the CI/CD workflow the suites have already run there, so only
  # manual (workflow_dispatch) runs need their own gate.
  unit-tests:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/unit-tests.yml
  e2e:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/e2e.yml
    # Building/publishing the extension is a deliberate release, so run the full gate.
    with:
      browsers: all
      sync: true

  bump-version:
    needs: [unit-tests, e2e]
    # Run when the gates passed or were skipped (workflow_call), never after a failure.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      new_sha: ${{ steps.set-outputs.outputs.new_sha }}
      new_version: ${{ steps.set-outputs.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump extension version
        id: bump_version
        run: |
          cd src/DependinatorVsCode
          npm version patch --no-git-tag-version
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        run: |
          # Use the "- " bullet lines from the triggering commit message as the
          # changelog entry; fall back to the commit subject if there are none,
          # or to a generic entry when the subject is just a merge message.
          BULLETS=$(git log -1 --pretty=%B | grep -E '^[[:space:]]*- ' | sed -E 's/^[[:space:]]+//' || true)
          if [ -z "$BULLETS" ]; then
            SUBJECT=$(git log -1 --pretty=%s)
            case "$SUBJECT" in
              Merge*) BULLETS="- Minor fixes and improvements" ;;
              *) BULLETS="- $SUBJECT" ;;
            esac
          fi
          {
            head -n 1 CHANGELOG.md
            echo ""
            echo "## ${{ steps.bump_version.outputs.version }} ($(date +%Y-%m-%d))"
            echo ""
            echo "$BULLETS"
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit and tag version
        run: |
          git add src/DependinatorVsCode/package.json src/DependinatorVsCode/package-lock.json CHANGELOG.md
          git commit -m "VS Code extension v${{ steps.bump_version.outputs.version }}"
          git tag "v${{ steps.bump_version.outputs.version }}"

      - name: Push version commit and tag
        run: git push origin HEAD:${GITHUB_REF_NAME} --tags

      - name: Set outputs
        id: set-outputs
        run: |
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "new_version=${{ steps.bump_version.outputs.version }}" >> "$GITHUB_OUTPUT"

  build-vsix:
    needs: bump-version
    # Explicit status check: the implicit success() would skip this job because the
    # skipped test-gate jobs upstream propagate through the needs chain.
    if: ${{ !cancelled() && needs.bump-version.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - win32-x64
          - win32-arm64
          - darwin-x64
          - darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci
        working-directory: src/DependinatorVsCode

      - name: Package extension
        run: npm run package:${{ matrix.target }}
        working-directory: src/DependinatorVsCode

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: dependinator-${{ matrix.target }}-vsix
          path: src/DependinatorVsCode/*.vsix
          if-no-files-found: error

      - name: Publish to Marketplace
        # event_name is 'push' when this workflow is called from the CI/CD main run.
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
        run: npx vsce publish --target ${{ matrix.target }} -p "$VSCE_PAT"
        working-directory: src/DependinatorVsCode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  release:
    needs: [bump-version, build-vsix]
    # Create a release only when the extension was actually published (same gate
    # as the Publish to Marketplace step). The explicit build-vsix status check is
    # needed because skipped upstream jobs would otherwise skip this job too.
    if: ${{ !cancelled() && needs.build-vsix.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_sha }}

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dependinator-*-vsix
          merge-multiple: true
          path: vsix

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.bump-version.outputs.new_version }}
        run: |
          # Extract this version's section from CHANGELOG.md (lines between the
          # "## <version>" heading and the next "## " heading). The trailing
          # space in the match keeps e.g. 0.8.1 from matching 0.8.10.
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver " " { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > notes.md
          {
            echo ""
            echo "**Install:** [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=michaelreichenauer.dependinator)"
            echo ""
            echo "**Companion web app:** [dependinator.com](https://dependinator.com) — view your models in any browser, on any device. Enable device sync in both the extension and the web app to keep your models available and up to date everywhere."
            echo ""
            echo "**Manual install:** the \`.vsix\` assets below are the VS Code extension installation packages, one per platform. Download the one matching your OS/CPU and install it in VS Code via *Extensions → \"...\" → Install from VSIX...* (or \`code --install-extension <file>.vsix\`)."
            echo ""
            echo "**Full changelog:** [CHANGELOG.md]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/blob/main/CHANGELOG.md)"
          } >> notes.md
          # Label each asset so the release page shows what the file is instead
          # of just the raw vsce file name (gh's "file#label" syntax).
          assets=()
          for f in vsix/*.vsix; do
            base=$(basename "$f" .vsix)
            target=${base#dependinator-}
            target=${target%-"$VERSION"}
            case "$target" in
              linux-x64) platform="Linux x64" ;;
              linux-arm64) platform="Linux ARM64" ;;
              win32-x64) platform="Windows x64" ;;
              win32-arm64) platform="Windows ARM64" ;;
              darwin-x64) platform="macOS Intel" ;;
              darwin-arm64) platform="macOS Apple Silicon" ;;
              *) platform="$target" ;;
            esac
            assets+=("$f#VS Code extension - $platform (vsix)")
          done
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file notes.md \
            "${assets[@]}"
