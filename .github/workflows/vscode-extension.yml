name: Build VS Code Extension

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to VS Code Marketplace (requires VSCE_PAT)
        type: boolean
        default: false

permissions:
  contents: write

# Serialize runs so two quick pushes to main can't race on the version-bump push.
concurrency:
  group: vscode-extension
  cancel-in-progress: false

jobs:
  # Gate the whole extension pipeline (version bump, build, publish) on the test suites.
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml
  e2e:
    uses: ./.github/workflows/e2e.yml
    # Building/publishing the extension is a deliberate release, so run the full gate.
    with:
      browsers: all
      sync: true

  bump-version:
    needs: [unit-tests, e2e]
    runs-on: ubuntu-latest
    outputs:
      new_sha: ${{ steps.set-outputs.outputs.new_sha }}
      new_version: ${{ steps.set-outputs.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump extension version
        id: bump_version
        run: |
          cd src/DependinatorVsCode
          npm version patch --no-git-tag-version
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        run: |
          # Use the "- " bullet lines from the triggering commit message as the
          # changelog entry; fall back to the commit subject if there are none,
          # or to a generic entry when the subject is just a merge message.
          BULLETS=$(git log -1 --pretty=%B | grep -E '^[[:space:]]*- ' | sed -E 's/^[[:space:]]+//' || true)
          if [ -z "$BULLETS" ]; then
            SUBJECT=$(git log -1 --pretty=%s)
            case "$SUBJECT" in
              Merge*) BULLETS="- Minor fixes and improvements" ;;
              *) BULLETS="- $SUBJECT" ;;
            esac
          fi
          cd src/DependinatorVsCode
          {
            head -n 1 CHANGELOG.md
            echo ""
            echo "## ${{ steps.bump_version.outputs.version }} ($(date +%Y-%m-%d))"
            echo ""
            echo "$BULLETS"
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit and tag version
        run: |
          git add src/DependinatorVsCode/package.json src/DependinatorVsCode/package-lock.json src/DependinatorVsCode/CHANGELOG.md
          git commit -m "VS Code extension v${{ steps.bump_version.outputs.version }}"
          git tag "v${{ steps.bump_version.outputs.version }}"

      - name: Push version commit and tag
        run: git push origin HEAD:${GITHUB_REF_NAME} --tags

      - name: Set outputs
        id: set-outputs
        run: |
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "new_version=${{ steps.bump_version.outputs.version }}" >> "$GITHUB_OUTPUT"

  build-vsix:
    needs: bump-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - win32-x64
          - win32-arm64
          - darwin-x64
          - darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci
        working-directory: src/DependinatorVsCode

      - name: Package extension
        run: npm run package:${{ matrix.target }}
        working-directory: src/DependinatorVsCode

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: dependinator-${{ matrix.target }}-vsix
          path: src/DependinatorVsCode/*.vsix
          if-no-files-found: error

      - name: Publish to Marketplace
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
        run: npx vsce publish --target ${{ matrix.target }} -p "$VSCE_PAT"
        working-directory: src/DependinatorVsCode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
